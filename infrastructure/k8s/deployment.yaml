---
# Quantum Hub — Kubernetes Deployment Manifests
# Deploys the full quantum ecosystem to a Kubernetes cluster.

apiVersion: v1
kind: Namespace
metadata:
  name: quantum-hub
  labels:
    app.kubernetes.io/name: quantum-hub
    app.kubernetes.io/part-of: quantum-hub

---
# ── API Gateway Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: quantum-hub
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: quantum-hub/api-gateway:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: quantum-secrets
                  key: redis-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quantum-secrets
                  key: database-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: quantum-hub
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP

---
# ── Web Dashboard Deployment ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  namespace: quantum-hub
  labels:
    app: web-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
    spec:
      containers:
        - name: web-dashboard
          image: quantum-hub/web-dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: GATEWAY_URL
              value: "http://api-gateway:3001"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: web-dashboard
  namespace: quantum-hub
spec:
  selector:
    app: web-dashboard
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
# ── Ingress ───────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quantum-hub-ingress
  namespace: quantum-hub
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: quantum.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-dashboard
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001

---
# ── Secrets (placeholder — replace with real values) ──────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: quantum-secrets
  namespace: quantum-hub
type: Opaque
stringData:
  redis-url: "redis://redis:6379"
  database-url: "postgresql://quantum:quantum@postgres:5432/quantumhub"
